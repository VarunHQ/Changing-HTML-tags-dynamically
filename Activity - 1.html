<!DOCTYPE html>
<html lang="en">
<head>
    <title>Play with a rectangle</title>
    <style>
        h2 {
            text-align: center;
        }
        .rectangle {
            border:1px solid black;
            width: 200px;
            height: 200px;
            margin:auto;
        }
        .buttons {
            padding: 20px;
            width: 200px;
            margin: auto;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Make changes to the rectangle</h2>
    <div class="rectangle"></div>
    <div class="buttons">
        <button onclick="changetocircle()">Make Circle</button>
        <button onclick="hiderect()">Hide Rectangle</button>
        <button onclick="showrect()">Show Rectangle</button>
    </div>
<script>
    let div = document.querySelector(".rectangle");
    function changetocircle() {
        div.style.borderRadius = "50%";
    }
    function hiderect() {
        div.style.display = "none";
    }
    function showrect() {
        div.style.display = "block";
    }
    div.onmouseenter = function() {
        div.style.backgroundColor = "red";
    }
div.onmouseleave = function() {
    div.style.background = "transparent";
}
</script>
</body>
</html>
